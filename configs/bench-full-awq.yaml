# Full benchmark sweep — AWQ variant. Pairs with bench-full.yaml.
#
# Identical to bench-full.yaml except for the model identifier (AWQ checkpoint)
# and the result directory. Run with QUANTIZATION=awq set on the server.

name: full-awq
description: Llama 3.1 8B AWQ-INT4 on RTX A5000 24 GB, ShareGPT trace.
# Pinned community AWQ checkpoint. Validated downloadable before the paid run.
model: hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4
base_url: http://localhost:8000/v1
backend: openai-chat
dataset:
  name: sharegpt
  num_prompts: 256
  extra_args:
    dataset_path: /workspace/datasets/ShareGPT_V3_unfiltered_cleaned_split.json
seed: 42
result_dir: results/bench/full-awq
concurrency_levels: [1, 4, 16, 32, 64]

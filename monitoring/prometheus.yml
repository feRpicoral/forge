# Prometheus scrape config for local development.
# vLLM exposes /metrics on the same port as the OpenAI API.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "vllm"
    static_configs:
      - targets: ["vllm-cpu:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
